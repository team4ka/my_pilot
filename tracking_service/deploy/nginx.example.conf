# Example Nginx vhost for tracking_service.
# Adapt server_name, ssl_certificate paths, and the upstream port.

upstream tracking_service_backend {
    server 127.0.0.1:8088;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name tracking.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tracking.example.com;

    ssl_certificate     /etc/ssl/cloudflare/tracking.example.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/tracking.example.com.key;

    client_max_body_size 1m;

    # Everything is proxied to FastAPI; the app serves:
    #   POST /api/tracking/generate
    #   GET  /track-and-verification/<orderNumber>
    #   GET  /static/royalmail/...
    #   GET  /static/files/placeholder.pdf
    location / {
        proxy_pass http://tracking_service_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
